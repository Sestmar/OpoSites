name: oposites
description: Copiloto de oposiciones tipo Duolingo — app móvil Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Estado global ──────────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navegación ─────────────────────────────────────────────────────────────
  go_router: ^14.6.0

  # ── HTTP ───────────────────────────────────────────────────────────────────
  dio: ^5.7.0

  # ── Almacenamiento seguro (tokens JWT) ─────────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Auth Google ────────────────────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── Serialización JSON ─────────────────────────────────────────────────────
  json_annotation: ^4.9.0

  # ── Internacionalización (fechas en español) ───────────────────────────────
  intl: ^0.19.0

  # ── Gráficas (progreso / evolución semanal) ────────────────────────────────
  fl_chart: ^0.69.0

  # ── Calendario ─────────────────────────────────────────────────────────────
  table_calendar: ^3.1.2

  # ── Links externos (noticias) ──────────────────────────────────────────────
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Generadores de código ──────────────────────────────────────────────────
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  json_serializable: ^6.8.0

  # ── Linting ────────────────────────────────────────────────────────────────
  flutter_lints: ^4.0.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.4.3

flutter:
  uses-material-design: true
