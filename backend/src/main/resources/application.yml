server:
  port: 8080

spring:
  application:
    name: oposites-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:oposites}
    username: ${DB_USER:oposites}
    password: ${DB_PASSWORD:oposites}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # validate: Hibernate NO crea ni modifica tablas; Flyway es el responsable del schema
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate: false => error si la BD ya tiene tablas sin baseline de Flyway
    baseline-on-migrate: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            scope:
              - email
              - profile
            # redirect-uri estándar de Spring Security OAuth2 Client
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  # ── IA: Gemini via Google AI Studio (nativo) ──────────────────────────────
  # Obtener API key en https://aistudio.google.com (free tier, sin tarjeta)
  # Variable de entorno requerida: GEMINI_API_KEY
  ai:
    openai:
      api-key: ${GROQ_API_KEY:change-me}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
      embedding:
        enabled: false

app:
  uploads:
    path: ${UPLOADS_PATH:./uploads}

  rate-limit:
    auth:
      # Límites LAXOS para desarrollo local — no interferir en pruebas.
      # En producción, application-prod.yml sobreescribe estos valores.
      requests-per-minute: 20   # peticiones/minuto por IP
      burst-capacity: 20        # pico instantáneo permitido

  jwt:
    # DEV: el default es base64("dev-only-insecure-do-not-use-in-production") — 336 bits, válido para HS256.
    # PROD: definir JWT_SECRET obligatoriamente. Generar con: openssl rand -base64 32
    secret: ${JWT_SECRET:ZGV2LW9ubHktaW5zZWN1cmUtZG8tbm90LXVzZS1pbi1wcm9kdWN0aW9u}
    expiration-ms: 86400000        # 24 horas
    refresh-expiration-ms: 604800000  # 7 días
  cors:
    # Orígenes permitidos separados por coma; en prod poner solo el dominio del panel admin
    allowed-origins: "http://localhost:3000,http://localhost:4200"
    allowed-origin-patterns: "http://localhost:*"

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha          # tags ordenados alfabéticamente
    operations-sorter: alpha    # métodos HTTP ordenados
    display-request-duration: true
  api-docs:
    enabled: true
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
