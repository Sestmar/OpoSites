# ─────────────────────────────────────────────────────────────────────────────
# Perfil de PRODUCCIÓN — sobreescribe solo lo que difiere de application.yml
# Activar con: --spring.profiles.active=prod  (o variable SPRING_PROFILES_ACTIVE=prod)
# ─────────────────────────────────────────────────────────────────────────────

app:
  rate-limit:
    auth:
      # Estricto: máximo 5 intentos/minuto por IP (login + register + refresh).
      # Con burst-capacity=5 se permite un pequeño pico inicial pero no más.
      # Ajustar según tráfico real: si los usuarios móviles hacen reintentos
      # automáticos legítimos, subir burst-capacity a 8-10 sin tocar rpm.
      requests-per-minute: 5
      burst-capacity: 5

  jwt:
    # En prod SIEMPRE usar variable de entorno — nunca el valor por defecto.
    secret: ${JWT_SECRET}
    expiration-ms: 900000         # 15 minutos (más corto en prod)
    refresh-expiration-ms: 604800000  # 7 días

  cors:
    # Solo el dominio del panel admin en producción. Sin wildcards.
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

springdoc:
  swagger-ui:
    enabled: false   # Swagger UI no disponible en producción
  api-docs:
    enabled: false   # /v3/api-docs no disponible en producción

spring:
  jpa:
    show-sql: false

management:
  endpoint:
    health:
      show-details: never   # No exponer detalles de salud en prod sin auth
