server:
  port: 8080

spring:
  application:
    name: oposites-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:oposites}
    username: ${DB_USER:oposites}
    password: ${DB_PASSWORD:oposites}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # validate: Hibernate NO crea ni modifica tablas; Flyway es el responsable del schema
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate: false => error si la BD ya tiene tablas sin baseline de Flyway
    baseline-on-migrate: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            scope:
              - email
              - profile
            # redirect-uri estándar de Spring Security OAuth2 Client
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  # ── IA: Gemini via OpenAI-compatible endpoint ─────────────────────────────
  # Obtener API key en https://aistudio.google.com (free tier, sin tarjeta)
  # Variable de entorno requerida: GEMINI_API_KEY
  ai:
    openai:
      api-key: ${GEMINI_API_KEY:change-me}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        options:
          model: gemini-2.0-flash
          temperature: 0.7
      # Desactivar embeddings: el endpoint OpenAI-compatible de Gemini no los soporta
      embedding:
        enabled: false

app:
  jwt:
    # En producción, usar una clave de mínimo 256 bits en Base64 desde variable de entorno
    secret: ${JWT_SECRET:Y291cnNlTXlTZWNyZXRLZXlGb3JKV1RBdXRoZW50aWNhdGlvbkZhc2UxMjM0NTY=}
    expiration-ms: 86400000        # 24 horas
    refresh-expiration-ms: 604800000  # 7 días
  cors:
    # Orígenes permitidos separados por coma; en prod poner solo el dominio del panel admin
    allowed-origins: "http://localhost:3000,http://localhost:4200"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
